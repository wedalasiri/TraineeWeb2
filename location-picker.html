<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Work Location</title>

    <link rel="stylesheet" href="css/location-picker.css">
</head>
<body>

<div class="background">

    <div class="card">

        <h2>Select your work location</h2>

        <p>
            We couldn't find your work location from Moodle.
            Please choose your branch once — it will be remembered on this device.
        </p>

        <div id="locations" class="locations"></div>

        <button id="confirmBtn" disabled>
            Confirm
        </button>

    </div>

</div>

<script type="module" src="js/location-picker.js"></script>

</body>
</html>
